name: agenda_medonha
description: "Organize os seus estudos!"

publish_to: 'none'

version: 1.0.2

environment:
  sdk: ^3.0.6

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  intl: ^0.19.0          # Versão exigida pelo Flutter novo
  share_plus: ^10.0.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "icon.png"
  web:
    generate: true
    image_path: "icon.png"
    background_color: "#ffffff"
    theme_color: "#64B5F6"

<!DOCTYPE html>
<html>
<head>
  <base href="/agenda-medonha/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Organize os seus estudos!">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Agenda">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Agenda Medonha</title>

  <style>
    /* Estilo básico para o fundo não ficar branco enquanto carrega */
    body { background-color: #121212; }
  </style>
</head>
<body>
  <script>
    window.addEventListener('load', function() {
      // Força o carregamento do motor sem usar Service Workers (que travam o iPad antigo)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    });
  </script>
  
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>

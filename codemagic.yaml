workflows:
  ios-ipa-build:
    name: Build iOS IPA for Agenda Medonha (iOS 12)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: 3.10.6
      xcode: latest  # Versão recomendada para manter suporte ao iOS 12
      groups:
        - app_store_credentials # Se você configurou certificados no painel
    scripts:
      - name: Get Flutter packages
        script: | 
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
      - name: Build IPA
        script: |
          # Se não tiver certificados configurados, use: 
          # flutter build ios --release --no-codesign
          
          flutter build ipa --release \
            --export-method=development \
            --build-name=1.0.2 \
            --build-number=1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - seuemail@exemplo.com # Coloque seu e-mail real aqui
